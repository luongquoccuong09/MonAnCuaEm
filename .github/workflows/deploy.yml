name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish MonAnCuaEm.csproj -c Release -o release --nologo

      # Với "project site" (https://<user>.github.io/<repo>/) cần đổi base href thành /<repo>/.
      # Nếu bạn dùng "user/organization site" (repo tên <user>.github.io) thì XOÁ bước này.
      - name: Rewrite base href for project site
        run: |
          sed -i 's|<base href="/" />|<base href="/${{ github.event.repository.name }}/" />|g' release/wwwroot/index.html
          sed -i 's|const base = "/";|const base = "/${{ github.event.repository.name }}/";|g' release/wwwroot/service-worker.js

      # Tắt Jekyll để GitHub Pages không bỏ qua thư mục _framework.
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      # SPA fallback: điều hướng phía client hoạt động khi tải thẳng vào 1 URL con.
      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
